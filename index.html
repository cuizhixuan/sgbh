<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阶位材料升级计算器</title>
    <style>
        :root {
            --primary-color: #2a8cff;
            --primary-dark: #1a7ae6;
            --secondary-color: #32d74b;
            --danger-color: #ff453a;
            --warning-color: #ff9f0a;
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
            --text-tertiary: #8e8e93;
            --bg-primary: #ffffff;
            --bg-secondary: #f2f2f7;
            --bg-tertiary: #e5e5ea;
            --border-color: #c7c7cc;
            --card-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 24px;
            --font-size-xs: 12px;
            --font-size-sm: 14px;
            --font-size-md: 16px;
            --font-size-lg: 18px;
            --font-size-xl: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.5;
            padding-bottom: 136px; /* 80px原有 + 56px底部导航 */
            max-width: 100vw;
            overflow-x: hidden;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: var(--spacing-md);
        }

        /* 顶部标题栏 */
        .header {
            background-color: var(--bg-primary);
            padding: var(--spacing-lg) var(--spacing-md);
            margin-bottom: var(--spacing-md);
            border-radius: var(--radius-lg);
            box-shadow: var(--card-shadow);
            position: sticky;
            top: 0;
            z-index: 100;
            text-align: center;
            border-bottom: 3px solid var(--primary-color);
        }
        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 4px;
        }
        .header .subtitle {
            font-size: var(--font-size-sm);
            color: #7f8c8d;
        }

        /* ========== 兵种切换标签 ========== */
        .class-tabs {
            display: flex;
            gap: 0;
            margin-bottom: var(--spacing-md);
            background: var(--bg-primary);
            border-radius: var(--radius-md);
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }
        .class-tab {
            flex: 1;
            padding: 12px 8px;
            border: none;
            background: transparent;
            font-size: var(--font-size-sm);
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            white-space: nowrap;
        }
        .class-tab::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 16px;
            right: 16px;
            height: 3px;
            border-radius: 3px 3px 0 0;
            background: transparent;
            transition: background 0.2s;
        }
        .class-tab.active {
            color: var(--primary-color);
        }
        .class-tab.active::after {
            background: var(--primary-color);
        }
        .class-tab.infantry.active { color: #2a8cff; }
        .class-tab.infantry.active::after { background: #2a8cff; }
        .class-tab.cavalry.active { color: #32d74b; }
        .class-tab.cavalry.active::after { background: #32d74b; }
        .class-tab.archer.active { color: #ff9f0a; }
        .class-tab.archer.active::after { background: #ff9f0a; }

        /* 兵种分组容器（合并后的卡片） */
        .class-group-card {
            display: none;
            background-color: var(--bg-primary);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            box-shadow: var(--card-shadow);
            margin-bottom: var(--spacing-md);
        }
        .class-group-card.active {
            display: block;
        }

        /* 兵种分组标题 */
        .class-group-header {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
            padding-bottom: var(--spacing-sm);
            border-bottom: 1px solid var(--border-color);
        }
        .class-group-header h2 {
            font-size: var(--font-size-md);
            font-weight: 600;
            flex: 1;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        .class-group-header.infantry h2 { color: #2a8cff; }
        .class-group-header.cavalry h2 { color: #32d74b; }
        .class-group-header.archer h2 { color: #ff9f0a; }
        .class-group-header .group-icon {
            font-size: 20px;
        }

        /* 角色行（合并后每个兵种下的角色行） */
        .character-row {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-md);
        }
        .character-row:last-child { margin-bottom: 0; }

        .character-row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .character-name {
            font-size: var(--font-size-md);
            font-weight: 600;
            color: var(--text-primary);
        }

        /* 等级选择器 - 简化动画，锁死宽度，修正箭头 */
        .level-selectors {
            display: flex;
            gap: var(--spacing-md);
            width: 100%;
            overflow: hidden;
        }

        .level-selector {
            flex: 1;
            min-width: 0 !important;
            max-width: calc(50% - var(--spacing-md)/2) !important;
            width: calc(50% - var(--spacing-md)/2) !important;
            overflow: hidden;
            position: relative;
        }

        .level-selector label {
            display: block;
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            margin-bottom: var(--spacing-xs);
            font-weight: 500;
        }

        /* 修正箭头：垂直居中对齐，不再靠下 */
        .select-wrapper {
            width: 100% !important;
            height: 44px !important;
            overflow: hidden !important;
            position: relative;
        }

        .select-wrapper select {
            width: 100% !important;
            max-width: 100% !important;
            min-width: 0 !important;
            height: 100% !important;
            padding: 0 12px !important;
            font-size: var(--font-size-md);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            appearance: none !important;
            -webkit-appearance: none !important;
            resize: none !important;
            white-space: nowrap;
            overflow: hidden !important;
            text-overflow: ellipsis !important;
            box-sizing: border-box !important;
        }

        /* 下拉箭头：精准垂直居中，修正靠下问题 */
        .select-wrapper::after {
            content: '';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%); /* 精准居中，解决靠下问题 */
            width: 16px;
            height: 16px;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236e6e73' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-size: contain;
            pointer-events: none;
            z-index: 1;
        }

        .select-wrapper select:disabled {
            background-color: var(--bg-secondary);
            color: var(--text-tertiary);
            cursor: not-allowed;
        }

        /* 目标option仅保留可选项，不可选的直接不渲染 */
        .select-wrapper select option {
            width: 200px !important;
            max-width: 200px !important;
            min-width: 0 !important;
            white-space: nowrap !important;
            overflow: hidden !important;
            text-overflow: ellipsis !important;
            padding: 8px 12px !important;
            font-size: var(--font-size-sm) !important;
            box-sizing: border-box !important;
            display: block !important;
        }

        /* 浏览器兼容兜底 */
        @-moz-document url-prefix() {
            .select-wrapper select {
                text-indent: 0.01px;
                text-overflow: '';
                border: 1px solid var(--border-color) !important;
            }
        }

        @media screen and (-webkit-min-device-pixel-ratio: 0) {
            .select-wrapper select {
                border: 1px solid var(--border-color) !important;
            }
            .select-wrapper select option {
                width: 200px !important;
            }
        }

        .char-status {
            font-size: var(--font-size-xs);
            color: var(--text-secondary);
            margin-top: var(--spacing-sm);
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--text-tertiary);
        }

        /* 材料输入区域 */
        .materials-input {
            background-color: var(--bg-primary);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
            box-shadow: var(--card-shadow);
        }
        .materials-input .section-title {
            font-size: var(--font-size-lg);
            font-weight: 600;
            margin-bottom: var(--spacing-md);
            padding-bottom: var(--spacing-sm);
            border-bottom: 1px solid var(--border-color);
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .materials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
        }

        .material-item {
            display: flex;
            flex-direction: column;
        }

        .material-item label {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            margin-bottom: var(--spacing-xs);
            font-weight: 500;
        }

        .material-item input {
            padding: 10px 12px;
            font-size: var(--font-size-md);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        .material-item input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        /* 活动币输入框 */
        .coin-input-row {
            margin-top: 16px;
        }
        .coin-input-row label {
            display: block;
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            margin-bottom: var(--spacing-xs);
            font-weight: 500;
        }
        .coin-input-row input {
            width: 100%;
            padding: 12px;
            font-size: var(--font-size-md);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: border-color 0.2s;
        }
        .coin-input-row input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(42, 140, 255, 0.1);
        }

        /* 礼包设置 */
        .package-settings {
            background-color: var(--bg-secondary);
            border-radius: var(--radius-sm);
            padding: var(--spacing-md);
            margin-top: var(--spacing-md);
        }

        .package-settings h4 {
            font-size: var(--font-size-md);
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
            color: var(--text-primary);
        }

        /* 按钮组 */
        .button-group {
            position: fixed;
            bottom: 56px;
            left: 0;
            right: 0;
            background-color: var(--bg-primary);
            padding: var(--spacing-md);
            display: flex;
            gap: var(--spacing-md);
            box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.08);
            z-index: 999;
        }
        .button-group button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: var(--radius-md);
            font-size: var(--font-size-md);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
        }
        #calculate-all {
            background-color: #4a6fa5;
            color: white;
        }
        #calculate-all:active {
            background-color: #3a5a80;
            transform: translateY(2px);
        }
        /* 结果区域 */
        .results-section {
            background-color: var(--bg-primary);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            margin-top: var(--spacing-md);
            margin-bottom: 110px;
            box-shadow: var(--card-shadow);
        }
        .results-section .section-title {
            font-size: var(--font-size-lg);
            font-weight: 600;
            margin-bottom: var(--spacing-md);
            padding-bottom: var(--spacing-sm);
            border-bottom: 1px solid var(--border-color);
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ========== 结果展示区 ========== */
        .result-summary {
            margin-bottom: var(--spacing-sm);
        }

        .result-item {
            margin-bottom: var(--spacing-lg);
        }
        .result-item:last-child {
            margin-bottom: 0;
        }

        .result-item h4 {
            font-size: var(--font-size-md);
            font-weight: 600;
            margin-bottom: var(--spacing-md);
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 材料卡片行 */
        .material-cards {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .material-result-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            border-left: 4px solid #ddd;
        }
        .material-result-card.shortage {
            border-left-color: var(--danger-color);
            background: #fff5f5;
        }
        .material-result-card.enough {
            border-left-color: var(--secondary-color);
            background: #f5fff7;
        }

        .material-result-card .mrc-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .material-result-card .mrc-icon {
            font-size: 20px;
        }
        .material-result-card .mrc-name {
            font-size: var(--font-size-md);
            font-weight: 700;
            color: #2c3e50;
        }

        .material-result-card .mrc-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }
        .mrc-stat {
            text-align: center;
            padding: 8px 4px;
            background: white;
            border-radius: var(--radius-sm);
        }
        .mrc-stat .mrc-val {
            font-size: 1.2rem;
            font-weight: 700;
            color: #2c3e50;
            line-height: 1.3;
        }
        .mrc-stat .mrc-val.highlight-red {
            color: var(--danger-color);
            font-size: 1.4rem;
        }
        .mrc-stat .mrc-val.highlight-green {
            color: var(--secondary-color);
        }
        .mrc-stat .mrc-label {
            font-size: var(--font-size-xs);
            color: var(--text-tertiary);
            margin-top: 2px;
        }

        /* 缺口购买提示条 */
        .mrc-action {
            margin-top: 10px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            font-size: var(--font-size-sm);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .mrc-action.need-buy {
            background: #fff0f0;
            color: #c0392b;
            border: 1px solid #f5c6cb;
        }
        .mrc-action.no-need {
            background: #f0fff4;
            color: #27ae60;
            border: 1px solid #c3e6cb;
        }

        /* 花销汇总卡片 */
        .cost-summary-card {
            background: linear-gradient(135deg, #4a6fa5, #3a5a80);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            color: white;
        }
        .cost-summary-card .cost-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            font-size: var(--font-size-sm);
        }
        .cost-summary-card .cost-row:last-child {
            border-bottom: none;
            font-size: var(--font-size-lg);
            font-weight: 700;
            margin-top: 4px;
            padding-top: 12px;
        }
        .cost-summary-card .cost-amount {
            font-weight: 700;
        }

        /* 角色明细小卡 */
        .char-detail-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .char-detail-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            font-size: var(--font-size-sm);
        }
        .char-detail-item .cd-name {
            font-weight: 700;
            color: #2c3e50;
            min-width: 36px;
        }
        .char-detail-item .cd-path {
            color: var(--text-secondary);
            flex: 1;
        }
        .char-detail-item .cd-mats {
            font-weight: 600;
            color: var(--text-primary);
            font-size: var(--font-size-xs);
        }

        /* 响应式调整：锁死宽度，无额外动画 */
        @media (min-width: 768px) {
            .container {
                max-width: 768px;
                margin: 0 auto;
            }
            .character-row {
                flex-direction: row;
                align-items: center;
            }
            .level-selector {
                max-width: calc(50% - var(--spacing-md)/2) !important;
                width: calc(50% - var(--spacing-md)/2) !important;
            }
        }
        /* ========== 底部导航栏 ========== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: var(--bg-primary);
            border-top: 1px solid var(--border-color);
            display: flex;
            z-index: 1000;
            box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .bottom-nav .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-tertiary);
            font-size: var(--font-size-xs);
            font-weight: 500;
            gap: 3px;
            transition: color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .bottom-nav .nav-item .nav-icon {
            font-size: 22px;
            line-height: 1;
        }
        .bottom-nav .nav-item.active {
            color: var(--primary-color);
        }
        .bottom-nav .nav-item.active .nav-icon {
            color: var(--primary-color);
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 顶部标题栏 -->
    <div class="header">
        <h1>阶位材料升级计算器</h1>
        <div class="subtitle">风采 · 神兵进阶规划</div>
    </div>

    <!-- 兵种切换标签 -->
    <div class="class-tabs">
        <button class="class-tab infantry active" data-group="infantry">⚔️ 步兵</button>
        <button class="class-tab cavalry" data-group="cavalry">🐴 骑兵</button>
        <button class="class-tab archer" data-group="archer">🏹 弓兵</button>
    </div>

    <!-- 神兵输入区域 -->
    <div class="characters-container">
        <!-- 步兵组 -->
        <div class="class-group-card active" data-group="infantry">
            <div class="class-group-header infantry">
                <h2><span class="group-icon">⚔️</span>步兵</h2>
            </div>

            <!-- 步兵1 -->
            <div class="character-row">
                <div class="character-row-header">
                    <div class="character-name">步1</div>
                </div>
                <div class="level-selectors">
                    <div class="level-selector">
                        <label for="current-level-1">当前等级</label>
                        <div class="select-wrapper">
                            <select id="current-level-1" class="current-level-select"></select>
                        </div>
                    </div>
                    <div class="level-selector">
                        <label for="target-level-1">目标等级</label>
                        <div class="select-wrapper">
                            <select id="target-level-1" class="target-level-select" disabled></select>
                        </div>
                    </div>
                </div>
                <div class="char-status" id="char-status-1">
                    <div class="status-dot"></div>
                    <span id="status-text-1">请先选择当前等级</span>
                </div>
            </div>

            <!-- 步兵2 -->
            <div class="character-row">
                <div class="character-row-header">
                    <div class="character-name">步2</div>
                </div>
                <div class="level-selectors">
                    <div class="level-selector">
                        <label for="current-level-2">当前等级</label>
                        <div class="select-wrapper">
                            <select id="current-level-2" class="current-level-select"></select>
                        </div>
                    </div>
                    <div class="level-selector">
                        <label for="target-level-2">目标等级</label>
                        <div class="select-wrapper">
                            <select id="target-level-2" class="target-level-select" disabled></select>
                        </div>
                    </div>
                </div>
                <div class="char-status" id="char-status-2">
                    <div class="status-dot"></div>
                    <span id="status-text-2">请先选择当前等级</span>
                </div>
            </div>
        </div>

        <!-- 骑兵组 -->
        <div class="class-group-card" data-group="cavalry">
            <div class="class-group-header cavalry">
                <h2><span class="group-icon">🐴</span>骑兵</h2>
            </div>

            <!-- 骑兵1 -->
            <div class="character-row">
                <div class="character-row-header">
                    <div class="character-name">骑1</div>
                </div>

    // 初始化等级选择器
    function initLevelSelectors(charId) {
        const currentSelect = document.getElementById(`current-level-${charId}`);
        const targetSelect = document.getElementById(`target-level-${charId}`);

        // 清空现有选项
        currentSelect.innerHTML = '';
        targetSelect.innerHTML = '';

        // 添加空选项
        const emptyOption = document.createElement('option');
        emptyOption.value = '';
        emptyOption.textContent = '请选择';
        currentSelect.appendChild(emptyOption.cloneNode(true));
        targetSelect.appendChild(emptyOption);

        // 添加等级选项
        for (let level = 1; level <= 50; level++) {
            const option = document.createElement('option');
            option.value = level;
            option.textContent = `${level}-${levelNameMap[level]}`;
            currentSelect.appendChild(option.cloneNode(true));
            targetSelect.appendChild(option);
        }

        // 初始状态
        currentSelect.value = '';
        targetSelect.value = '';
        targetSelect.disabled = true;
        updateStatusText(charId);
    }

    // 重构：目标等级仅展示可选选项（不可选的直接不渲染，而非隐藏）
    function updateTargetLevelOptions(charId) {
        const currentSelect = document.getElementById(`current-level-${charId}`);
        const targetSelect = document.getElementById(`target-level-${charId}`);
        const currentLevel = parseInt(currentSelect.value);

        // 无当前等级：禁用并重置目标选择器
        if (!currentLevel) {
            targetSelect.disabled = true;
            targetSelect.innerHTML = '';
            const emptyOption = document.createElement('option');
            emptyOption.value = '';
            emptyOption.textContent = '请选择';
            targetSelect.appendChild(emptyOption);
            targetSelect.value = '';
            return;
        }

        // 有当前等级：重新生成仅包含可选选项的目标列表（≥当前等级）
        targetSelect.disabled = false;
        targetSelect.innerHTML = ''; // 清空所有旧选项

        // 第一步：添加空选项
        const emptyOption = document.createElement('option');
        emptyOption.value = '';
        emptyOption.textContent = '请选择';
        targetSelect.appendChild(emptyOption);

        // 第二步：仅添加 ≥ 当前等级的选项（不可选的直接不生成，彻底不展示）
        for (let level = currentLevel; level <= 50; level++) {
            const option = document.createElement('option');
            option.value = level;
            option.textContent = `${level}-${levelNameMap[level]}`;
            targetSelect.appendChild(option);
        }

        // 默认选中当前等级（提升用户体验）
        targetSelect.value = currentLevel;
    }

    // 更新状态文本
    function updateStatusText(charId) {
        const statusText = document.getElementById(`status-text-${charId}`);
        const currentSelect = document.getElementById(`current-level-${charId}`);
        const targetSelect = document.getElementById(`target-level-${charId}`);
        const currentLevel = parseInt(currentSelect.value);
        const targetLevel = parseInt(targetSelect.value);
        const statusDot = document.getElementById(`char-status-${charId}`).querySelector('.status-dot');

        if (!currentLevel) {
            statusText.textContent = "请先选择当前等级";
            statusDot.style.backgroundColor = "var(--warning-color)";
        } else {
            statusText.textContent = `${levelNameMap[currentLevel]} → ${levelNameMap[targetLevel]}`;
            statusDot.style.backgroundColor = "var(--secondary-color)";
        }
    }

    // 计算总需求
    function calculateTotal() {
        // 读取全局材料拥有量
        const ownedZitan = parseInt(document.getElementById('global-owned-zitan').value) || 0;
        const ownedJingjin = parseInt(document.getElementById('global-owned-jingjin').value) || 0;
        const ownedQingjin = parseInt(document.getElementById('global-owned-qingjin').value) || 0;

        // 读取礼包配置
        const zitanPerPackage = parseInt(document.getElementById('zitan-package').value) || 12;
        const zitanPrice = parseInt(document.getElementById('zitan-pkg-price').value) || 11;
        const jingjinPerPackage = parseInt(document.getElementById('jingjin-package').value) || 1;
        const jingjinPrice = parseInt(document.getElementById('jingjin-pkg-price').value) || 18;
        const qingjinPerPackage = parseInt(document.getElementById('qingjin-package').value) || 1;
        const qingjinPrice = parseInt(document.getElementById('qingjin-pkg-price').value) || 55;

        // 读取活动币
        const totalCoin = parseInt(document.getElementById('total-activity-coin').value) || 0;

        // 计算所有神兵的总材料需求
        let totalZitanNeed = 0, totalJingjinNeed = 0, totalQingjinNeed = 0;
        let charDetails = [];

        for (let charId = 1; charId <= 6; charId++) {
            const currentLevel = parseInt(document.getElementById(`current-level-${charId}`).value);
            const targetLevel = parseInt(document.getElementById(`target-level-${charId}`).value);

            // 跳过未选择等级的角色
            if (!currentLevel || !targetLevel || currentLevel >= targetLevel) continue;

            // 计算单个角色的材料需求
            let charZitan = 0, charJingjin = 0, charQingjin = 0;
            for (let level = currentLevel + 1; level <= targetLevel; level++) {
                const [zitan, jingjin, qingjin] = levelMaterialData[level] || [0, 0, 0];
                charZitan += zitan;
                charJingjin += jingjin;
                charQingjin += qingjin;
            }

            // 累加总需求
            totalZitanNeed += charZitan;
            totalJingjinNeed += charJingjin;
            totalQingjinNeed += charQingjin;

            // 记录单个角色详情
            charDetails.push({
                id: charId,
                name: getCharName(charId),
                currentLevel: currentLevel,
                targetLevel: targetLevel,
                zitan: charZitan,
                jingjin: charJingjin,
                qingjin: charQingjin
            });
        }

        // 计算缺口
        const zitanShortage = Math.max(0, totalZitanNeed - ownedZitan);
        const jingjinShortage = Math.max(0, totalJingjinNeed - ownedJingjin);
        const qingjinShortage = Math.max(0, totalQingjinNeed - ownedQingjin);

        // 计算需要购买的礼包数和花费
        const zitanPackages = Math.ceil(zitanShortage / zitanPerPackage);
        const zitanCost = zitanPackages * zitanPrice;
        const jingjinPackages = Math.ceil(jingjinShortage / jingjinPerPackage);
        const jingjinCost = jingjinPackages * jingjinPrice;
        const qingjinPackages = Math.ceil(qingjinShortage / qingjinPerPackage);
        const qingjinCost = qingjinPackages * qingjinPrice;

        const totalCost = zitanCost + jingjinCost + qingjinCost;
        const coinSurplus = totalCoin - totalCost;

        // 生成结果HTML
        // 收集升级目标摘要
        const targets = charDetails.map(c => `<strong>${c.name}</strong> ${levelNameMap[c.currentLevel]}→${levelNameMap[c.targetLevel]}`).join('　');

        let resultHTML = `
                <div class="result-item">
                    <h4>🎯 升级目标</h4>
                    <p style="font-size:14px;color:#555;line-height:1.8;">${targets || '无'}</p>
                </div>

                <div class="result-item">
                    <h4>📦 材料需求明细</h4>
                    <div class="material-cards">
                        <!-- 紫檀木 -->
                        <div class="material-result-card ${zitanShortage > 0 ? 'shortage' : 'enough'}">
                            <div class="mrc-header">
                                <span class="mrc-icon">🪵</span>
                                <span class="mrc-name">紫檀木</span>
                            </div>
                            <div class="mrc-grid">
                                <div class="mrc-stat">
                                    <div class="mrc-val">${formatNumber(totalZitanNeed)}</div>
                                    <div class="mrc-label">需要</div>
                                </div>
                                <div class="mrc-stat">
                                    <div class="mrc-val">${formatNumber(ownedZitan)}</div>
                                    <div class="mrc-label">拥有</div>
                                </div>
                                <div class="mrc-stat">
                                    <div class="mrc-val ${zitanShortage > 0 ? 'highlight-red' : 'highlight-green'}">${zitanShortage > 0 ? formatNumber(zitanShortage) : '✓'}</div>
                                    <div class="mrc-label">缺口</div>
                                </div>
                            </div>
                            ${zitanShortage > 0 ? `<div class="mrc-action need-buy">⚠️ 需购买 <strong>${zitanPackages}</strong> 个礼包（${zitanPerPackage}个/包）</div>` : `<div class="mrc-action no-need">✅ 材料充足，无需购买</div>`}
                        </div>

                        <!-- 精金 -->
                        <div class="material-result-card ${jingjinShortage > 0 ? 'shortage' : 'enough'}">
                            <div class="mrc-header">
                                <span class="mrc-icon">✨</span>
                                <span class="mrc-name">精金</span>
                            </div>
                            <div class="mrc-grid">
                                <div class="mrc-stat">
                                    <div class="mrc-val">${formatNumber(totalJingjinNeed)}</div>
                                    <div class="mrc-label">需要</div>
                                </div>
                                <div class="mrc-stat">
                                    <div class="mrc-val">${formatNumber(ownedJingjin)}</div>
                                    <div class="mrc-label">拥有</div>
                                </div>
                                <div class="mrc-stat">
                                    <div class="mrc-val ${jingjinShortage > 0 ? 'highlight-red' : 'highlight-green'}">${jingjinShortage > 0 ? formatNumber(jingjinShortage) : '✓'}</div>
                                    <div class="mrc-label">缺口</div>
                                </div>
                            </div>
                            ${jingjinShortage > 0 ? `<div class="mrc-action need-buy">⚠️ 需购买 <strong>${jingjinPackages}</strong> 个礼包（${jingjinPerPackage}个/包）</div>` : `<div class="mrc-action no-need">✅ 材料充足，无需购买</div>`}
                        </div>

                        <!-- 青金石 -->
                        <div class="material-result-card ${qingjinShortage > 0 ? 'shortage' : 'enough'}">
                            <div class="mrc-header">
                                <span class="mrc-icon">💎</span>
                                <span class="mrc-name">青金石</span>
                            </div>
                            <div class="mrc-grid">
                                <div class="mrc-stat">
                                    <div class="mrc-val">${formatNumber(totalQingjinNeed)}</div>
                                    <div class="mrc-label">需要</div>
                                </div>
                                <div class="mrc-stat">
                                    <div class="mrc-val">${formatNumber(ownedQingjin)}</div>
                                    <div class="mrc-label">拥有</div>
                                </div>

                                    <div class="mrc-val ${qingjinShortage > 0 ? 'highlight-red' : 'highlight-green'}">${qingjinShortage > 0 ? formatNumber(qingjinShortage) : '✓'}</div>

                                </div>

                        </div>

                </div>

                        ${zitanPackages > 0 ? `<div class="cost-row"><span>🪵 紫檀木礼包</span><span class="cost-amount">${zitanPackages}个 × ${zitanPrice}币 = ${formatNumber(zitanCost)} 活动币</span></div>` : ''}

                        <div class="cost-row"><span>📊 合计花费</span><span class="cost-amount">${formatNumber(totalCost)} 活动币</span></div>
                    </div>
                    <div style="margin-top:12px;padding:12px;background:#f8f9fa;border-radius:8px;text-align:center;">
                        <span style="font-size:14px;color:#555;">可用 <strong style="font-size:1.2rem;color:#2c3e50;">${formatNumber(totalCoin)}</strong> 活动币 →
                        ${coinSurplus >= 0
                            ? `<span style="color:#27ae60;font-weight:700;font-size:1.1rem;">剩余 ${formatNumber(coinSurplus)}</span> ✅`
                            : `<span style="color:#e74c3c;font-weight:700;font-size:1.1rem;">不足 ${formatNumber(Math.abs(coinSurplus))}</span> ❌`}
                        </span>
                    </div>
                </div>
            `;

        // 添加单个角色详情
        if (charDetails.length > 0) {
            resultHTML += `
                    <div class="result-item">
                        <h4>👤 各角色明细</h4>
                        <div class="char-detail-list">
                `;
            charDetails.forEach(char => {
                resultHTML += `
                        <div class="char-detail-item">
                            <span class="cd-name">${char.name}</span>
                            <span class="cd-path">${levelNameMap[char.currentLevel]} → ${levelNameMap[char.targetLevel]}</span>
                            <span class="cd-mats">🪵${formatNumber(char.zitan)} ✨${formatNumber(char.jingjin)} 💎${formatNumber(char.qingjin)}</span>
                        </div>
                    `;
            });
            resultHTML += `
                        </div>
                    </div>
                `;
        }

        // 显示结果
        document.getElementById('total-result').innerHTML = resultHTML;

        // 【新增核心代码：滚动到页面最底部】
        window.scrollTo({
            top: document.body.scrollHeight,
            left: 0,
            behavior: 'auto' // 无平滑动画，符合减少额外动画的需求
        });
    }

    // 辅助函数：获取角色名称
    function getCharName(charId) {
        const nameMap = {
            1: '步1', 2: '步2', 3: '骑1', 4: '骑2', 5: '弓1', 6: '弓2'
        };
        return nameMap[charId] || `角色${charId}`;
    }

    // 辅助函数：格式化数字（千分位）
    function formatNumber(num) {
        return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }
</script>
